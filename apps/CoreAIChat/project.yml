name: CoreAIChat
options:
  bundleIdPrefix: com.example
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "27.0"
packages:
  coreai-models:
    path: ../../coreai-models
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.3"
settings:
  base:
    # DEVELOPMENT_TEAM: <your-team-id>   (or pick a team in Xcode's Signing pane)
    SWIFT_VERSION: "6.0"
targets:
  CoreAIChat:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../AppShared/ModelDownloader.swift
      - path: Resources/tokenizer
        type: folder
        buildPhase: resources
    dependencies:
      - package: coreai-models
        product: CoreAIShared
      - package: swift-transformers
        product: Tokenizers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.CoreAIChat
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: CoreAIChat.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: CoreAIChat
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
