name: CoreAIChat
options:
  bundleIdPrefix: com.example
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "27.0"
packages:
  coreai-models:
    path: ../../coreai-models
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.3"
settings:
  base:
    DEVELOPMENT_TEAM: MFN25KNUGJ
    SWIFT_VERSION: "6.0"
targets:
  CoreAIChat:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../AppShared/ModelDownloader.swift
      - path: Resources/tokenizer
        type: folder
        buildPhase: resources
      - path: Assets.xcassets
    dependencies:
      - package: coreai-models
        product: CoreAIShared
      # Qwen pipelined mode: Apple's LLM engine stack (EngineFactory / LanguageBundle).
      # Requires apps/coreai-pipelined-extra-states.patch on the coreai-models clone.
      - package: coreai-models
        product: CoreAILM
      - package: swift-transformers
        product: Tokenizers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daisukemajima.CoreAIChat
        CODE_SIGN_STYLE: Automatic
        # App Store Connect would otherwise prompt for export-compliance on every build.
        # The app only uses HTTPS (Hugging Face downloads) — exempt.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        CODE_SIGN_ENTITLEMENTS: CoreAIChat.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: CoreAIChat
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
