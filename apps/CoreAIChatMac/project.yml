name: CoreAIChatMac
options:
  bundleIdPrefix: com.coreai
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "27.0"

packages:
  # Local patched fork (NOT upstream apple/coreai-models): the catalog's decode-pipelined
  # bundles load via the fork's CoreAIShared / CoreAILM additions. The iOS CoreAIChat app
  # builds the same catalog models against this fork.
  coreai-models:
    path: ../../coreai-models

# Run config Release: the engine's per-token host work is ~3x slower unoptimized.
schemes:
  CoreAIChatMac:
    build:
      targets:
        CoreAIChatMac: all
    run:
      config: Release

targets:
  CoreAIChatMac:
    type: application
    platform: macOS
    deploymentTarget: "27.0"
    sources:
      - path: Sources
      - path: ../AppShared/ModelDownloader.swift
    dependencies:
      - package: coreai-models
        product: CoreAILM
      - package: coreai-models
        product: CoreAIShared            # low-level runtime: PreparedModel / InferenceFunction / NDArray
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coreai.chatmac
        DEVELOPMENT_TEAM: MFN25KNUGJ
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        # Direct (non-App-Store) distribution: no sandbox (full disk access for tens-of-GB
        # local bundles), hardened runtime ON (required to notarize).
        ENABLE_APP_SANDBOX: "NO"
        ENABLE_HARDENED_RUNTIME: "YES"
        SWIFT_APPROACHABLE_CONCURRENCY: "YES"
